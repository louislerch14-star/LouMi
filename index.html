<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LouiMi - Unsere Zentrale</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            text-align: center;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        header {
            background: #6c5ce7;
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        section {
            background: white;
            margin: 20px auto;
            padding: 20px;
            max-width: 600px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .bus-button {
            display: inline-block;
            background-color: #00b894;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            margin-top: 10px;
            transition: 0.3s;
        }

        .bus-button:hover {
            background-color: #009475;
            transform: scale(1.05);
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            background: #f9f9f9;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>LouiMi</h1>
        <p>Der place to be für Louis & Mia 💀😉</p>
    </header>

    <main>
        <section id="todos">
            <h2>ToDo Liste</h2>
            <ul id="todo-list">
                <li>Zusammen chillen 🎮</li>
                <li>Geile Videos schneiden 🎬</li>
            </ul>
        </section>

        <section id="media">
            <h2>Galerie</h2>
            <p>Hier kommen bald unsere witzigen Clips hin! 📸</p>
        </section>

        <section id="bus">
            <h2>Mia's Bus-Service</h2>
            <p>Immer safe ankommen:</p>
            <a href="https://www.moobilplus.de" target="_blank" class="bus-button">
                Hier Bus buchen, Digger! 🚌
            </a>
        </section>
    </main>

</body>
</html>

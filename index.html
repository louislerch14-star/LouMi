<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LouiMi Dashboard</title>
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .wrapper { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h1 { margin-top: 0; color: var(--accent); text-align: center; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        input { background: #334155; border: none; padding: 10px; border-radius: 8px; color: white; width: 70%; }
        ul { list-style: none; padding: 0; }
        li { background: #334155; padding: 12px; border-radius: 8px; margin: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>LouiMi 💀</h1>
    
    <div class="card">
        <h2 id="bus-text" style="font-size: 1.2rem;">Status: Lade...</h2>
        <button onclick="updateBus()">Status ändern 🚌</button>
    </div>

    <div class="card">
        <input type="text" id="todo-input" placeholder="Neues ToDo...">
        <button onclick="addTodo()">+</button>
        <ul id="todo-list"></ul>
    </div>
</div>

<script>
    // Deine Konfiguration wie gewünscht
    const SUPABASE_URL = "https://sdwelvinfbqxivvxnjkh.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkd2VsdmluZmJxeGl2dnhuamtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDAxNjMsImV4cCI6MjA5NTQ3NjE2M30.aRc-rwNoZwx2vHS3tvvDkQr7t6el6ankRsgkldgHCBE";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function load() {
        // Bus Status laden
        const { data: b } = await supabaseClient.from('bus_status').select('*').eq('id', 1).single();
        document.getElementById('bus-text').innerText = `Bus: ${b ? b.status : 'Nicht gefunden'}`;
        
        // ToDos laden
        const { data: t } = await supabaseClient.from('todos').select('*');
        document.getElementById('todo-list').innerHTML = t.map(i => `<li>${i.task}</li>`).join('');
    }

    async function updateBus() {
        const currentText = document.getElementById('bus-text').innerText;
        const newStatus = currentText.includes('Nicht') ? 'Gebucht! ✅' : 'Nicht gebucht';
        await supabaseClient.from('bus_status').update({ status: newStatus }).eq('id', 1);
        load();
    }

    async function addTodo() {
        const input = document.getElementById('todo-input');
        if(input.value) {
            await supabaseClient.from('todos').insert([{ task: input.value }]);
            input.value = '';
            load();
        }
    }

    load();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <link rel="icon" type="image/x-icon" href="loumi.png">
    <link rel="icon" type="image/png" sizes="32x32" href="loumi.png">
    <link rel="icon" type="image/png" sizes="16x16" href="loumi.png">
    <link rel="apple-touch-icon" sizes="180x180" href="loumi.png">
    <meta charset="UTF-8">
    <title>LouMi | Die Webseite</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg-dark: #121212; --card-bg: #1e1e1e; --mint: #00b894; --mint-light: #55efc4; --text: #e0e0e0; }
        body { background-color: var(--bg-dark); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); width: 100%; max-width: 500px; margin-bottom: 20px; border: 1px solid #333; }
        h1 { color: var(--mint); text-align: center; margin-top: 0; }
        h3 { color: var(--mint-light); }
        button { background: var(--mint); color: #000; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; transition: 0.3s; }
        button:hover { background: var(--mint-light); transform: scale(1.02); }
        input { background: #333; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; width: 88%; margin-bottom: 10px; }
        .media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        img { width: 100%; border-radius: 10px; border: 2px solid var(--mint); }
        ul { padding: 0; list-style: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>LouMi </h1>
    <h3 id="bus-status">Bus: Lade...</h3>
    <button onclick="toggleBus()">Bus-Status ändern 🚌</button>
</div>

<div class="card">
    <h3>📝 ToDos</h3>
    <input type="text" id="todo-input" placeholder="Neue Aufgabe...">
    <button onclick="addTodo()">Aufgabe hinzufügen</button>
    <ul id="todo-list"></ul>
</div>

<div class="card">
    <h3>🎵 LouMi Vibes</h3>
    <input type="text" id="song-title" placeholder="Song Name">
    <input type="text" id="song-url" placeholder="YouTube URL">
    <button onclick="addSong()">Song hinzufügen</button>
    <ul id="song-list"></ul>
</div>

<div class="card">
    <h3>Galerie 📸</h3>
    <input type="file" id="file-input">
    <button onclick="uploadMedia()">Hochladen</button>
    <div id="media-grid" class="media-grid"></div>
</div>

<script>
    const supabaseClient = supabase.createClient(
        "https://hrahghiqzmabceupyjzo.supabase.co", 
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhyYWhnaGlxem1hYmNldXB5anpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNDc0NjksImV4cCI6MjA5OTgyMzQ2OX0.FhwGpOEJx1Xf3BzE3X1YjhBge406SQ_RkMXGgTnoTe8"
    );

    async function init() {
        const today = new Date().toDateString();
        const lastVisit = localStorage.getItem('last-visit');
        if(lastVisit !== today) {
            await supabaseClient.from('bus_status').update({ status: 'Nicht gebucht' }).eq('id', 1);
            localStorage.setItem('last-visit', today);
        }
        load();
    }

    async function load() {
        const { data: b } = await supabaseClient.from('bus_status').select('status').eq('id', 1).single();
        document.getElementById('bus-status').innerText = `Bus: ${b.status}`;
        
        const { data: t } = await supabaseClient.from('todos').select('*');
        document.getElementById('todo-list').innerHTML = t.map(i => `<li style="padding:10px; border-bottom:1px solid #333;">${i.task}</li>`).join('');
        
        const { data: songs } = await supabaseClient.from('songs').select('*');
        document.getElementById('song-list').innerHTML = songs.map(s => `
            <li style="margin-bottom:15px; border-bottom:1px solid #333; padding-bottom:10px;">
                <a href="${s.url.replace('embed/', 'watch?v=')}" target="_blank" style="color:var(--mint); text-decoration:none;">${s.title}</a>
                <iframe width="100%" height="200" src="${s.url}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="margin-top:10px; border-radius:10px; border: 1px solid #333;"></iframe>
            </li>
        `).join('');

        const { data: files } = await supabaseClient.storage.from('media').list();
        document.getElementById('media-grid').innerHTML = files.map(f => `<img src="https://hrahghiqzmabceupyjzo.supabase.co/storage/v1/object/public/media/${f.name}">`).join('');
    }

    async function addSong() {
        const title = document.getElementById('song-title').value;
        const url = document.getElementById('song-url').value;
        if(!title || !url) return;
        
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        const videoId = (match && match[2].length === 11) ? match[2] : null;

        if (videoId) {
            const embedUrl = `https://www.youtube.com/embed/${videoId}`;
            await supabaseClient.from('songs').insert([{ title, url: embedUrl }]);
            document.getElementById('song-title').value = '';
            document.getElementById('song-url').value = '';
            load();
        } else {
            alert("Digga, das ist keine gültige YouTube-URL!");
        }
    }

    async function uploadMedia() {
        const file = document.getElementById('file-input').files[0];
        if(!file) return;
        await supabaseClient.storage.from('media').upload(Date.now() + "_" + file.name, file);
        load();
    }

    async function toggleBus() {
        const newStatus = document.getElementById('bus-status').innerText.includes('Nicht') ? 'Gebucht! ✅' : 'Nicht gebucht';
        await supabaseClient.from('bus_status').update({ status: newStatus }).eq('id', 1);
        load();
    }

    async function addTodo() {
        const input = document.getElementById('todo-input');
        if(!input.value) return;
        await supabaseClient.from('todos').insert([{ task: input.value }]);
        input.value = '';
        load();
    }

    init();
</script>
</body>
</html>

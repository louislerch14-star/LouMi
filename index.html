<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>LouiMi | Zentrale</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --mint: #00b894; --mint-dark: #009475; --bg: #f0f7f6; }
        body { background: linear-gradient(135deg, var(--bg), #d1e7e4); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 500px; margin-bottom: 20px; }
        h1 { color: var(--mint); text-align: center; }
        button { background: var(--mint); color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        button:hover { background: var(--mint-dark); }
        input { padding: 10px; border-radius: 8px; border: 1px solid #ccc; width: 60%; }
        .media-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        img, video { width: 100%; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>LouiMi 🌊</h1>
        <div id="bus-box">
            <h3 id="bus-status">Lade Status...</h3>
            <button onclick="updateBus()">Bus Status toggeln</button>
        </div>
    </div>

    <div class="card">
        <h3>ToDos</h3>
        <input type="text" id="todo-input" placeholder="Neue Aufgabe...">
        <button onclick="addTodo()">+</button>
        <ul id="todo-list"></ul>
    </div>

    <div class="card">
        <h3>Galerie</h3>
        <input type="file" id="file-upload" accept="image/*,video/*">
        <button onclick="uploadMedia()">Upload</button>
        <div id="media-grid" class="media-grid"></div>
    </div>

    <script>
        const supabase = supabase.createClient('https://sdwelvinfbqxivvxnjkh.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkd2VsdmluZmJxeGl2dnhuamtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MDAxNjMsImV4cCI6MjA5NTQ3NjE2M30.aRc-rwNoZwx2vHS3tvvDkQr7t6el6ankRsgkldgHCBE');

        async function load() {
            // Bus & Todos
            const { data: b } = await supabase.from('bus_status').select('*').eq('id', 1).single();
            document.getElementById('bus-status').innerText = `Bus: ${b.status}`;
            const { data: t } = await supabase.from('todos').select('*');
            document.getElementById('todo-list').innerHTML = t.map(i => `<li>${i.task}</li>`).join('');
            
            // Medien laden
            const { data: files } = await supabase.storage.from('media').list();
            const grid = document.getElementById('media-grid');
            grid.innerHTML = files.map(f => {
                const url = `https://sdwelvinfbqxivvxnjkh.supabase.co/storage/v1/object/public/media/${f.name}`;
                return `<img src="${url}" alt="Media">`;
            }).join('');
        }

        async function uploadMedia() {
            const file = document.getElementById('file-upload').files[0];
            await supabase.storage.from('media').upload(file.name, file);
            load();
        }

        async function updateBus() {
            const newStatus = document.getElementById('bus-status').innerText.includes('Nicht') ? 'Gebucht! ✅' : 'Nicht gebucht';
            await supabase.from('bus_status').update({ status: newStatus }).eq('id', 1);
            load();
        }

        async function addTodo() {
            const task = document.getElementById('todo-input').value;
            await supabase.from('todos').insert([{ task }]);
            load();
        }

        load();
    </script>
</body>
</html>

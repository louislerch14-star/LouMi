<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #8b5cf6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 40px; }
        .wrapper { width: 100%; max-width: 500px; }
        .card { background: var(--card); padding: 24px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h1 { margin-top: 0; color: var(--accent); }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        input { background: #334155; border: none; padding: 10px; border-radius: 8px; color: white; width: 70%; }
        ul { list-style: none; padding: 0; }
        li { background: #334155; padding: 12px; border-radius: 8px; margin: 8px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>LouiMi 💀</h1>
    
    <div class="card">
        <h2 id="bus-text">Status: Lade...</h2>
        <button onclick="updateBus()">Status ändern 🚌</button>
    </div>

    <div class="card">
        <input type="text" id="todo-input" placeholder="Neues ToDo...">
        <button onclick="addTodo()">+</button>
        <ul id="todo-list"></ul>
    </div>
</div>

<script>
    const supabase = supabase.createClient('https://hrahghiqzmabceupyjzo.supabase.co', 'sb_publishable_oUO-22W29APNbeJOmW2jIw_YsyiHyW7');

    async function load() {
        const { data: b } = await supabase.from('bus_status').select('*').single();
        document.getElementById('bus-text').innerText = `Bus: ${b.status}`;
        
        const { data: t } = await supabase.from('todos').select('*');
        document.getElementById('todo-list').innerHTML = t.map(i => `<li>${i.task}</li>`).join('');
    }

    async function updateBus() {
        const newStatus = document.getElementById('bus-text').innerText.includes('Nicht') ? 'Gebucht! ✅' : 'Nicht gebucht';
        await supabase.from('bus_status').update({ status: newStatus }).eq('id', 1);
        load();
    }

    async function addTodo() {
        const task = document.getElementById('todo-input').value;
        if(task) {
            await supabase.from('todos').insert([{ task }]);
            document.getElementById('todo-input').value = '';
            load();
        }
    }

    load();
</script>
</body>
</html>
